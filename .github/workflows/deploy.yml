name: 🚀 Build & Deploy MediConnect to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy MediConnect to GitHub Pages
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ✅ Verify deploy folder exists
        run: |
          echo "=== MediConnect Web Deploy ==="
          ls -la flutterApps/my_project/docs/
          echo "index.html size: $(wc -c < flutterApps/my_project/docs/index.html) bytes"

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: flutterApps/my_project/docs
          publish_branch: gh-pages
          commit_message: "🚀 Deploy MediConnect — ${{ github.sha }}"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

      - name: ⏳ Wait for GitHub Pages to propagate
        run: sleep 20

      - name: ✅ Verify Deployment is Live
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://192372040.github.io/MyAPP/" || echo "000")
          echo "GitHub Pages HTTP Status: $HTTP_STATUS"
          echo "Live URL: https://192372040.github.io/MyAPP"
          if [[ "$HTTP_STATUS" =~ ^(200|301|302)$ ]]; then
            echo "✅ MediConnect is LIVE!"
          else
            echo "⏳ Pages still propagating (status: $HTTP_STATUS) — this is normal"
          fi

      - name: 📊 Write Job Summary
        if: always()
        run: |
          echo "## ✅ MediConnect Deployed to GitHub Pages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Live URL | https://192372040.github.io/MyAPP |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | ✅ Deployed |" >> $GITHUB_STEP_SUMMARY
