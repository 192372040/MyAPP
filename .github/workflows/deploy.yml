name: 🚀 Build & Deploy MediConnect to GitHub Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  # ─────────────────────────────────────────
  # JOB 1: Build Flutter Web
  # ─────────────────────────────────────────
  build:
    name: Build Flutter Web
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get
        working-directory: ./flutterApps/my_project

      - name: 🔍 Analyze code
        run: flutter analyze --no-fatal-infos
        working-directory: ./flutterApps/my_project
        continue-on-error: true

      - name: 🏗️ Build Flutter Web
        run: flutter build web --release --base-href "/MyAPP/"
        working-directory: ./flutterApps/my_project

      - name: 📤 Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: flutterApps/my_project/build/web
          retention-days: 1

  # ─────────────────────────────────────────
  # JOB 2: Deploy to GitHub Pages
  # ─────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 📥 Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web

      - name: 🚀 Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: build/web
          publish_branch: gh-pages
          commit_message: "🚀 Deploy MediConnect — ${{ github.sha }}"
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'

  # ─────────────────────────────────────────
  # JOB 3: Selenium E2E Tests
  # ─────────────────────────────────────────
  selenium-tests:
    name: Selenium E2E Tests
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⏳ Wait for GitHub Pages to go live
        run: sleep 45

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 🌐 Install Google Chrome
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable

      - name: 📦 Install Selenium test dependencies
        run: npm install
        working-directory: ./flutterApps/my_project/selenium-tests

      - name: 🧪 Run Selenium E2E Tests
        run: npm test
        working-directory: ./flutterApps/my_project/selenium-tests
        env:
          BASE_URL: "https://192372040.github.io/MyAPP"
          HEADLESS: "true"

      - name: 📊 Upload test results on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-results
          path: flutterApps/my_project/selenium-tests/reports/
